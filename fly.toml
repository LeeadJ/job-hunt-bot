# fly.toml app configuration file generated for job-hunt-bot on 2026-03-23T22:28:28+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'job-hunt-bot'
primary_region = 'fra'

[build]

[env]
  NODE_ENV = 'production'
  PUPPETEER_EXECUTABLE_PATH = '/usr/bin/chromium'
  PUPPETEER_SKIP_CHROMIUM_DOWNLOAD = 'true'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
